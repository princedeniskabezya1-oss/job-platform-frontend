<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIFT Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f2ef;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-size:22px;
font-weight:bold;
}

.layout{
display:grid;
grid-template-columns:260px 1fr;
gap:30px;
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.sidebar-avatar{
width:90px;
height:90px;
border-radius:50%;
border:4px solid white;
}

button{
padding:8px 16px;
border:none;
border-radius:20px;
background:#0a66c2;
color:white;
cursor:pointer;
}

button:hover{
background:#004182;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.icon-btn{
background:#0a66c2;
color:white;
border:none;
border-radius:50%;
width:32px;
height:32px;
font-size:18px;
cursor:pointer;
}

.experience-card{
border-left:3px solid #0a66c2;
padding-left:15px;
margin-bottom:15px;
}

.company{
font-weight:600;
}

.date{
font-size:13px;
color:#666;
}

.skill-tag{
display:inline-block;
background:#eef3f8;
padding:6px 12px;
border-radius:20px;
margin:4px;
font-size:13px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

</style>

</head>

<body>

<header class="topbar">

<div class="logo">AIFT</div>

<div>
<button onclick="openPublicProfile()">Public Profile</button>
</div>

</header>

<div class="layout">

<!-- LEFT PROFILE -->

<aside>

<div class="card">

<img id="avatar" class="sidebar-avatar">
  <input type="file" id="photoUpload">

<h3 id="name"></h3>
<p id="headline"></p>

<p id="location"></p>

</div>

</aside>

<!-- CENTER -->

<main>

<div class="card">
<h2>About</h2>
<p id="bio"></p>
</div>

<div class="card">

<div class="section-header">
<h2>Experience</h2>
<button class="icon-btn" onclick="openExp()">+</button>
</div>

<div id="experienceList"></div>

</div>

<div class="card">

<div class="section-header">
<h2>Education</h2>
<button class="icon-btn" onclick="openEdu()">+</button>
</div>

<div id="educationList"></div>

</div>

<div class="card">

<div class="section-header">
<h2>Skills</h2>
<button class="icon-btn" onclick="openSkill()">+</button>
</div>

<div id="skillsList"></div>

</div>

</main>

</div>

<!-- EXPERIENCE MODAL -->

<div id="expModal" class="modal">
<div class="modal-content">

<h3>Add Experience</h3>

<input id="expTitle" placeholder="Title">
<input id="expCompany" placeholder="Company">
<input id="expStart" placeholder="Start Date">
<input id="expEnd" placeholder="End Date">

<button onclick="saveExperience()">Save</button>

</div>
</div>

<!-- EDUCATION MODAL -->

<div id="eduModal" class="modal">
<div class="modal-content">

<h3>Add Education</h3>

<input id="eduSchool" placeholder="School">
<input id="eduDegree" placeholder="Degree">

<button onclick="saveEducation()">Save</button>

</div>
</div>

<!-- SKILL MODAL -->

<div id="skillModal" class="modal">
<div class="modal-content">

<h3>Add Skill</h3>

<input id="skillInput">

<button onclick="saveSkill()">Save</button>

</div>
</div>
<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")

let currentUser=null

const avatar=document.getElementById("avatar")
const nameEl=document.getElementById("name")
const headline=document.getElementById("headline")
const locationEl=document.getElementById("location")
const bio=document.getElementById("bio")

const experienceList=document.getElementById("experienceList")
const educationList=document.getElementById("educationList")
const skillsList=document.getElementById("skillsList")

async function loadProfile(){

const res=await fetch(API+"/api/users/me",{
headers:{Authorization:"Bearer "+token}
})

currentUser=await res.json()

renderProfile()

}

function renderProfile(){

avatar.src=currentUser.profileImage||"https://cdn-icons-png.flaticon.com/512/149/149071.png"

nameEl.innerText=currentUser.name
headline.innerText=currentUser.headline||""
locationEl.innerText=currentUser.location||""
bio.innerText=currentUser.bio||""
document.getElementById("strengthBar").style.width=currentUser.completeness+"%"
renderExperience()
renderEducation()
renderSkills()

}

function renderExperience(){

experienceList.innerHTML=""

(currentUser.experience||[]).forEach((e,i)=>{

experienceList.innerHTML+=`

<div class="experience-card">

<h4>${e.title}</h4>

<p class="company">${e.company}</p>

<p class="date">${e.startDate} - ${e.endDate||"Present"}</p>

<button onclick="editExperience(${i})">Edit</button>

<button onclick="deleteExperience(${i})">Delete</button>

</div>

`

})

}

function renderEducation(){

educationList.innerHTML=""

(currentUser.education||[]).forEach((e,i)=>{

educationList.innerHTML+=`

<div>

<h4>${e.school}</h4>

<p>${e.degree}</p>

<button onclick="editEducation(${i})">Edit</button>

<button onclick="deleteEducation(${i})">Delete</button>

</div>

`

})

}

function renderSkills(){

skillsList.innerHTML=""

(currentUser.skills||[]).forEach((s,i)=>{

skillsList.innerHTML+=`
<span class="skill-tag">

${s}

<span onclick="deleteSkill(${i})" style="cursor:pointer">✕</span>

</span>
`

})

}

function openExp(){
expModal.style.display="flex"
}
  function editExperience(index){

const exp=currentUser.experience[index]

expTitle.value=exp.title
expCompany.value=exp.company
expStart.value=exp.startDate
expEnd.value=exp.endDate

expModal.dataset.edit=index

expModal.style.display="flex"

}

function openEdu(){
eduModal.style.display="flex"
}
function editEducation(index){

const edu=currentUser.education[index]

eduSchool.value=edu.school
eduDegree.value=edu.degree

eduModal.dataset.edit=index

eduModal.style.display="flex"

}
function openSkill(){
skillModal.style.display="flex"
}

async function saveExperience(){

const exp={
title:expTitle.value,
company:expCompany.value,
startDate:expStart.value,
endDate:expEnd.value
}

const list=currentUser.experience||[]

if(expModal.dataset.edit){

list[expModal.dataset.edit]=exp

delete expModal.dataset.edit

}else{

list.push(exp)

}

await updateProfile({experience:list})

expModal.style.display="none"

}

async function deleteExperience(index){

const list=currentUser.experience

list.splice(index,1)

await updateProfile({experience:list})

}

async function saveEducation(){

const edu={
school:eduSchool.value,
degree:eduDegree.value
}

const list=currentUser.education||[]

list.push(edu)

await updateProfile({education:list})

eduModal.style.display="none"

}

async function deleteEducation(index){

const list=currentUser.education

list.splice(index,1)

await updateProfile({education:list})

}

async function saveSkill(){

const skill=skillInput.value

const list=currentUser.skills||[]

list.push(skill)

await updateProfile({skills:list})

skillModal.style.display="none"

}

async function deleteSkill(index){

const list=currentUser.skills

list.splice(index,1)

await updateProfile({skills:list})

}

async function updateProfile(data){

const formData = new FormData()

Object.keys(data).forEach(key => {

if(Array.isArray(data[key])){

formData.append(key, JSON.stringify(data[key]))

}else{

formData.append(key, data[key])

}

})

const res = await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{
Authorization:"Bearer "+token
},

body:formData

})

currentUser = await res.json()

renderProfile()

}

function openPublicProfile(){

window.location.href="public-profile.html?id="+currentUser._id

}
document.getElementById("photoUpload").onchange = async function(){

const file=this.files[0]

const formData=new FormData()

formData.append("profileImage",file)

const res=await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{Authorization:"Bearer "+token},

body:formData

})

currentUser=await res.json()

renderProfile()

}
loadProfile()

</script>
