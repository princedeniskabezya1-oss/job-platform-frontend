<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIFT Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f2ef;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-size:22px;
font-weight:bold;
color:#0a66c2;
}

.nav-buttons button{
margin-left:10px;
}

/* PROFILE HEADER */

.profile-header{
max-width:1000px;
margin:20px auto;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.banner{
height:180px;
background:#ddd;
position:relative;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

.banner input{
position:absolute;
right:15px;
bottom:15px;
}

.profile-info{
padding:20px;
position:relative;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
position:absolute;
top:-60px;
left:20px;
background:white;
object-fit:cover;
}

.avatar-upload{
position:absolute;
top:70px;
left:20px;
}

.profile-text{
margin-left:150px;
}

.profile-text h2{
margin:0;
}

.profile-text p{
margin:4px 0;
color:#555;
}

/* PROFILE STRENGTH */

.strength{
margin-top:10px;
}

.strength-bar{
background:#eee;
height:8px;
border-radius:10px;
overflow:hidden;
}

.strength-fill{
height:8px;
background:#0a66c2;
width:0%;
}

/* MAIN LAYOUT */

.layout{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.experience{
border-left:3px solid #0a66c2;
padding-left:15px;
margin-bottom:15px;
}

.company{
font-weight:600;
}

.date{
font-size:13px;
color:#777;
}

.skill{
display:inline-block;
background:#eef3f8;
padding:6px 12px;
border-radius:20px;
margin:4px;
}

button{
padding:6px 14px;
border:none;
border-radius:20px;
background:#0a66c2;
color:white;
cursor:pointer;
}

button:hover{
background:#004182;
}

/* MODALS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:350px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

</style>
</head>
<body>

<div class="topbar">

<div class="logo">AIFT</div>

<div class="nav-buttons">

<button onclick="goFeed()">Feed</button>
<button onclick="goNetwork()">Network</button>
<button onclick="openPublicProfile()">Public Profile</button>

</div>

</div>
<div class="profile-header">

<div class="banner">

<img id="banner">

<input type="file" id="bannerUpload">

</div>

<div class="profile-info">

<img id="avatar" class="avatar">

<input type="file" id="photoUpload" class="avatar-upload">

<div class="profile-text">

<h2 id="name"></h2>

<p id="headline"></p>

<p id="location"></p>

<div class="strength">

<div style="font-size:13px">Profile Strength</div>

<div class="strength-bar">
<div id="strengthBar" class="strength-fill"></div>
</div>

</div>

</div>

</div>

</div>

<div class="layout">

<div class="card">

<div class="section-header">
<h3>About</h3>
<button onclick="openEditProfile()">Edit</button>
</div>

<p id="bio"></p>

</div>
<div class="card">

<div class="section-header">
<h3>Experience</h3>
<button onclick="openExp()">+</button>
</div>

<div id="experienceList"></div>

</div>

<div class="card">

<div class="section-header">
<h3>Education</h3>
<button onclick="openEdu()">+</button>
</div>

<div id="educationList"></div>

</div>

<div class="card">

<div class="section-header">
<h3>Skills</h3>
<button onclick="openSkill()">+</button>
</div>

<div id="skillsList"></div>

</div>

<div class="card">

<h3>Featured</h3>

<p>Upload portfolio items or featured work.</p>

<button>Upload Portfolio</button>

</div>

</div>
<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")

let currentUser=null

async function loadProfile(){

const res=await fetch(API+"/api/users/me",{
headers:{Authorization:"Bearer "+token}
})

currentUser=await res.json()

renderProfile()

}

function renderProfile(){

avatar.src=currentUser.profileImage||"https://cdn-icons-png.flaticon.com/512/149/149071.png"

banner.src=currentUser.bannerImage||"https://via.placeholder.com/900x200"

name.innerText=currentUser.name
headline.innerText=currentUser.headline||""
location.innerText=currentUser.location||""
bio.innerText=currentUser.bio||""

strengthBar.style.width=(currentUser.completeness||0)+"%"

renderExperience()
renderEducation()
renderSkills()

}

/* EXPERIENCE */

function renderExperience(){

experienceList.innerHTML=""

(currentUser.experience||[]).forEach((e,i)=>{

experienceList.innerHTML+=`
<div class="experience">
<b>${e.title}</b>
<div class="company">${e.company}</div>
<div class="date">${e.startDate} - ${e.endDate||"Present"}</div>
<button onclick="editExperience(${i})">Edit</button>
<button onclick="deleteExperience(${i})">Delete</button>
</div>
`

})

}

/* EDUCATION */

function renderEducation(){

educationList.innerHTML=""

(currentUser.education||[]).forEach((e,i)=>{

educationList.innerHTML+=`
<div>
<b>${e.school}</b>
<div>${e.degree}</div>
<button onclick="editEducation(${i})">Edit</button>
<button onclick="deleteEducation(${i})">Delete</button>
</div>
`

})

}

/* SKILLS */

function renderSkills(){

skillsList.innerHTML=""

(currentUser.skills||[]).forEach((s,i)=>{

skillsList.innerHTML+=`
<span class="skill">
${s}
<span onclick="deleteSkill(${i})" style="cursor:pointer">✕</span>
</span>
`

})

}

/* UPDATE PROFILE */

async function updateProfile(data){

const formData=new FormData()

Object.keys(data).forEach(key=>{
formData.append(key,JSON.stringify(data[key]))
})

const res=await fetch(API+"/api/users/profile",{

method:"PATCH",
headers:{Authorization:"Bearer "+token},
body:formData

})

currentUser=await res.json()

renderProfile()

}

/* PHOTO */

photoUpload.onchange=async function(){

const fd=new FormData()
fd.append("profileImage",this.files[0])

const res=await fetch(API+"/api/users/profile",{

method:"PATCH",
headers:{Authorization:"Bearer "+token},
body:fd

})

currentUser=await res.json()

renderProfile()

}

/* BANNER */

bannerUpload.onchange=async function(){

const fd=new FormData()
fd.append("bannerImage",this.files[0])

const res=await fetch(API+"/api/users/profile",{

method:"PATCH",
headers:{Authorization:"Bearer "+token},
body:fd

})

currentUser=await res.json()

renderProfile()

}

/* NAVIGATION */

function openPublicProfile(){
window.location.href="public-profile.html?id="+currentUser._id
}

function goFeed(){
window.location.href="talent.html"
}

function goNetwork(){
window.location.href="network.html"
}

/* CLOSE MODALS OUTSIDE */

window.onclick=function(e){

if(e.target.classList.contains("modal")){
e.target.style.display="none"
}

}

loadProfile()

</script>

</body>
</html>
