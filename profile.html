<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIFT Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f2ef;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-weight:bold;
font-size:22px;
color:#0a66c2;
}

.nav-buttons button{
margin-left:10px;
}

/* PROFILE HEADER */

.profile-header{
background:white;
max-width:1000px;
margin:20px auto;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.banner{
height:180px;
background:#ddd;
position:relative;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

.banner input{
position:absolute;
right:15px;
bottom:15px;
}

.profile-info{
padding:20px;
position:relative;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
position:absolute;
top:-60px;
left:20px;
background:white;
object-fit:cover;
}

.avatar-upload{
position:absolute;
left:20px;
top:70px;
}

.profile-text{
margin-left:150px;
}

.profile-text h2{
margin:0;
}

.profile-text p{
margin:5px 0;
color:#555;
}

/* PROFILE STRENGTH */

.strength{
margin-top:10px;
}

.strength-bar{
background:#eee;
height:8px;
border-radius:10px;
overflow:hidden;
}

.strength-fill{
height:8px;
background:#0a66c2;
width:0%;
}

/* LAYOUT */

.layout{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr;
gap:20px;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* SECTION HEADER */

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

/* EXPERIENCE */

.experience{
border-left:3px solid #0a66c2;
padding-left:15px;
margin-bottom:15px;
}

.company{
font-weight:600;
}

.date{
font-size:13px;
color:#777;
}

/* SKILLS */

.skill{
display:inline-block;
background:#eef3f8;
padding:6px 12px;
border-radius:20px;
margin:4px;
}

/* BUTTON */

button{
padding:6px 14px;
border:none;
border-radius:20px;
background:#0a66c2;
color:white;
cursor:pointer;
}

button:hover{
background:#004182;
}

/* MODALS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:350px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">AIFT</div>

<div class="nav-buttons">

<button onclick="goFeed()">Feed</button>
<button onclick="openPublicProfile()">Public Profile</button>

</div>

</div>

<!-- PROFILE HEADER -->

<div class="profile-header">

<div class="banner">

<img id="banner">

<input type="file" id="bannerUpload">

</div>

<div class="profile-info">

<img id="avatar" class="avatar">

<input type="file" id="photoUpload" class="avatar-upload">

<div class="profile-text">

<h2 id="name"></h2>

<p id="headline"></p>

<p id="location"></p>

<div class="strength">

<div style="font-size:13px">Profile Strength</div>

<div class="strength-bar">

<div id="strengthBar" class="strength-fill"></div>

</div>

</div>

</div>

</div>

</div>

<!-- MAIN -->

<div class="layout">

<div class="card">

<h3>About</h3>

<p id="bio"></p>

</div>

<div class="card">

<div class="section-header">

<h3>Experience</h3>

<button onclick="openExp()">+</button>

</div>

<div id="experienceList"></div>

</div>

<div class="card">

<div class="section-header">

<h3>Education</h3>

<button onclick="openEdu()">+</button>

</div>

<div id="educationList"></div>

</div>

<div class="card">

<div class="section-header">

<h3>Skills</h3>

<button onclick="openSkill()">+</button>

</div>

<div id="skillsList"></div>

</div>

</div>

<!-- EXPERIENCE MODAL -->

<div id="expModal" class="modal">

<div class="modal-content">

<h3>Experience</h3>

<input id="expTitle" placeholder="Title">

<input id="expCompany" placeholder="Company">

<input id="expStart" placeholder="Start">

<input id="expEnd" placeholder="End">

<button onclick="saveExperience()">Save</button>

</div>

</div>

<!-- EDUCATION MODAL -->

<div id="eduModal" class="modal">

<div class="modal-content">

<h3>Education</h3>

<input id="eduSchool" placeholder="School">

<input id="eduDegree" placeholder="Degree">

<button onclick="saveEducation()">Save</button>

</div>

</div>

<!-- SKILL MODAL -->

<div id="skillModal" class="modal">

<div class="modal-content">

<h3>Skill</h3>

<input id="skillInput">

<button onclick="saveSkill()">Save</button>

</div>

</div>

<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")

let currentUser=null

async function loadProfile(){

const res=await fetch(API+"/api/users/me",{headers:{Authorization:"Bearer "+token}})

currentUser=await res.json()

renderProfile()

}

function renderProfile(){

avatar.src=currentUser.profileImage||"https://cdn-icons-png.flaticon.com/512/149/149071.png"

banner.src=currentUser.bannerImage||"https://via.placeholder.com/900x200"

name.innerText=currentUser.name

headline.innerText=currentUser.headline||""

location.innerText=currentUser.location||""

bio.innerText=currentUser.bio||""

strengthBar.style.width=(currentUser.completeness||0)+"%"

renderExperience()

renderEducation()

renderSkills()

}

/* EXPERIENCE */

function renderExperience(){

experienceList.innerHTML=""

(currentUser.experience||[]).forEach((e,i)=>{

experienceList.innerHTML+=`

<div class="experience">

<b>${e.title}</b>

<div class="company">${e.company}</div>

<div class="date">${e.startDate} - ${e.endDate||"Present"}</div>

<button onclick="editExperience(${i})">Edit</button>

<button onclick="deleteExperience(${i})">Delete</button>

</div>

`

})

}

function openExp(){expModal.style.display="flex"}

function editExperience(i){

const e=currentUser.experience[i]

expTitle.value=e.title

expCompany.value=e.company

expStart.value=e.startDate

expEnd.value=e.endDate

expModal.dataset.edit=i

expModal.style.display="flex"

}

async function saveExperience(){

const exp={

title:expTitle.value,

company:expCompany.value,

startDate:expStart.value,

endDate:expEnd.value

}

const list=currentUser.experience||[]

if(expModal.dataset.edit){

list[expModal.dataset.edit]=exp

delete expModal.dataset.edit

}else{

list.push(exp)

}

await updateProfile({experience:list})

expModal.style.display="none"

}

async function deleteExperience(i){

const list=currentUser.experience

list.splice(i,1)

await updateProfile({experience:list})

}

/* EDUCATION */

function renderEducation(){

educationList.innerHTML=""

(currentUser.education||[]).forEach((e,i)=>{

educationList.innerHTML+=`

<div>

<b>${e.school}</b>

<div>${e.degree}</div>

<button onclick="editEducation(${i})">Edit</button>

<button onclick="deleteEducation(${i})">Delete</button>

</div>

`

})

}

function openEdu(){eduModal.style.display="flex"}

function editEducation(i){

const e=currentUser.education[i]

eduSchool.value=e.school

eduDegree.value=e.degree

eduModal.dataset.edit=i

eduModal.style.display="flex"

}

async function saveEducation(){

const edu={

school:eduSchool.value,

degree:eduDegree.value

}

const list=currentUser.education||[]

if(eduModal.dataset.edit){

list[eduModal.dataset.edit]=edu

delete eduModal.dataset.edit

}else{

list.push(edu)

}

await updateProfile({education:list})

eduModal.style.display="none"

}

async function deleteEducation(i){

const list=currentUser.education

list.splice(i,1)

await updateProfile({education:list})

}

/* SKILLS */

function renderSkills(){

skillsList.innerHTML=""

(currentUser.skills||[]).forEach((s,i)=>{

skillsList.innerHTML+=`

<span class="skill">

${s}

<span onclick="deleteSkill(${i})" style="cursor:pointer">✕</span>

</span>

`

})

}

function openSkill(){skillModal.style.display="flex"}

async function saveSkill(){

const list=currentUser.skills||[]

list.push(skillInput.value)

await updateProfile({skills:list})

skillModal.style.display="none"

}

async function deleteSkill(i){

const list=currentUser.skills

list.splice(i,1)

await updateProfile({skills:list})

}

/* UPDATE PROFILE */

async function updateProfile(data){

const formData=new FormData()

Object.keys(data).forEach(key=>{

formData.append(key,JSON.stringify(data[key]))

})

const res=await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{Authorization:"Bearer "+token},

body:formData

})

currentUser=await res.json()

renderProfile()

}

/* PHOTO */

photoUpload.onchange=async function(){

const fd=new FormData()

fd.append("profileImage",this.files[0])

const res=await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{Authorization:"Bearer "+token},

body:fd

})

currentUser=await res.json()

renderProfile()

}

/* BANNER */

bannerUpload.onchange=async function(){

const fd=new FormData()

fd.append("bannerImage",this.files[0])

const res=await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{Authorization:"Bearer "+token},

body:fd

})

currentUser=await res.json()

renderProfile()

}

/* MODAL CLOSE ON OUTSIDE CLICK */

window.onclick=function(e){

if(e.target.classList.contains("modal")){

e.target.style.display="none"

}

}

function openPublicProfile(){

window.location.href="public-profile.html?id="+currentUser._id

}

function goFeed(){

window.location.href="talent.html"

}

loadProfile()

</script>

</body>
</html>
