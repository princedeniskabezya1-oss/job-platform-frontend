<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIFT Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f2ef;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-size:22px;
font-weight:bold;
}

/* LAYOUT */

.layout{
display:grid;
grid-template-columns:260px 1fr 280px;
gap:30px;
max-width:1200px;
margin:auto;
padding:30px;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* LEFT SIDEBAR PROFILE */

.profile-card{
text-align:center;
padding:0;
overflow:hidden;
}

.sidebar-banner img{
width:100%;
height:120px;
object-fit:cover;
}

.sidebar-avatar-wrapper{
margin-top:-40px;
}

.sidebar-avatar{
width:80px;
height:80px;
border-radius:50%;
border:4px solid white;
}

.sidebar-actions{
display:flex;
flex-direction:column;
gap:10px;
padding:20px;
}

.upload-btn input{
display:none;
}

.upload-btn{
background:#0a66c2;
color:white;
padding:6px 10px;
border-radius:20px;
font-size:12px;
cursor:pointer;
}

.upload-btn:hover{
background:#004182;
}

/* BUTTONS */

button{
padding:8px 16px;
border:none;
border-radius:20px;
background:#0a66c2;
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#004182;
}

/* RIGHT SIDEBAR */

.strength-bar{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin:10px 0;
}

.strength-fill{
height:100%;
background:#0a66c2;
border-radius:10px;
}
.quick-actions{
display:flex;
flex-direction:column;
gap:10px;
}
/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input,
.modal textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}
.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.icon-btn{
background:#0a66c2;
color:white;
border:none;
border-radius:50%;
width:32px;
height:32px;
font-size:18px;
cursor:pointer;
}

.experience-card{
border-left:3px solid #0a66c2;
padding-left:15px;
margin-bottom:15px;
}

.company{
font-weight:600;
}

.date{
font-size:13px;
color:#666;
}

.skill-tag{
display:inline-block;
background:#eef3f8;
padding:6px 12px;
border-radius:20px;
margin:4px;
font-size:13px;
}

.skill-tag:hover{
background:#dce6f1;
}
  .activity-card{
border-bottom:1px solid #eee;
padding:12px 0;
font-size:14px;
}
</style>

</head>

<body>

<header class="topbar">

<div class="logo">AIFT</div>

<div>
<button onclick="goHome()">Home</button>
<button onclick="openPublicProfile()">Public Profile</button>
</div>

</header>

<div class="layout">

<!-- LEFT SIDEBAR -->

<aside>

<div class="card profile-card">

<div class="sidebar-banner">
<img id="bannerImage">
</div>

<div class="sidebar-avatar-wrapper">
<img id="sidebarImage" class="sidebar-avatar">
</div>

<h3 id="sidebarName"></h3>
<p id="sidebarHeadline"></p>

<p id="location"></p>
<a id="website"></a>

<div class="sidebar-actions">

<label class="upload-btn">
Change Photo
<input type="file" id="profileUpload">
</label>

<label class="upload-btn">
Change Banner
<input type="file" id="bannerUpload">
</label>

<button id="editBtn">Edit Profile</button>

<button onclick="openPublicProfile()">View Profile</button>

</div>

</div>

</aside>

<!-- CENTER CONTENT -->

<main>

<div class="card">
<h2>About</h2>
<p id="bio"></p>
</div>

<div class="card">
<div class="section-header">

<h2>Experience</h2>

<button class="icon-btn" onclick="openExperience()">+</button>

</div>

<div id="experienceList"></div>
</div>

<div class="card">
<div class="section-header">

<h2>Education</h2>

<button class="icon-btn" onclick="openEducation()">+</button>

</div>

<div id="educationList"></div>
</div>

<div class="card">

<div class="section-header">

<h2>Skills</h2>

<button class="icon-btn" onclick="openSkillModal()">+</button>

</div>

<div id="skillsList"></div>

</div>

<div class="card">

<div class="section-header">

<h2>Activity</h2>

<button class="icon-btn" onclick="createPost()">+</button>

</div>

<div id="activityList"></div>

</div>

</main>

<!-- RIGHT SIDEBAR -->

<aside>

<div class="card">

<h3>Profile Strength</h3>

<div class="strength-bar">
<div id="strengthBar" class="strength-fill"></div>
</div>

<p>Complete your profile to increase visibility.</p>

<hr>

<h3>Quick Actions</h3>

<div class="quick-actions">

<button onclick="openExperience()">+ Experience</button>

<button onclick="openEducation()">+ Education</button>

<button onclick="openSkillModal()">+ Skill</button>

<button onclick="editBtn.click()">Edit Profile</button>

</div>

</div>

</aside>

</div>

<!-- EDIT MODAL -->

<div id="editModal" class="modal">

<div class="modal-content">

<h2>Edit Profile</h2>

<input id="editName" placeholder="Name">
<input id="editHeadline" placeholder="Headline">
<input id="editLocation" placeholder="Location">
<input id="editWebsite" placeholder="Website">

<textarea id="editBio"></textarea>

<button onclick="saveProfile()">Save</button>
<button onclick="closeEdit()">Cancel</button>

</div>

</div>

<!-- EXPERIENCE MODAL -->

<div id="expModal" class="modal">

<div class="modal-content">

<h2>Add Experience</h2>

<input id="expTitle" placeholder="Title">
<input id="expCompany" placeholder="Company">
<input id="expStart" placeholder="Start Date">
<input id="expEnd" placeholder="End Date">

<button onclick="saveExperience()">Save</button>

</div>

</div>

<!-- EDUCATION MODAL -->

<!-- EDUCATION MODAL -->

<div id="eduModal" class="modal">

<div class="modal-content">

<h2>Add Education</h2>

<input id="eduSchool" placeholder="School">
<input id="eduDegree" placeholder="Degree">
<input id="eduField" placeholder="Field">

<button onclick="saveEducation()">Save</button>

</div>

</div>

<!-- SKILL MODAL -->

<div id="skillModal" class="modal">

<div class="modal-content">

<h2>Add Skill</h2>

<input id="skillInput" placeholder="Skill name">

<button onclick="saveSkill()">Save</button>

</div>

</div>
  

<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")
  if(!token){

console.warn("No token found, redirecting to login")

window.location.href="login.html"

}

let currentUser=null

const sidebarImage=document.getElementById("sidebarImage")
const bannerImage=document.getElementById("bannerImage")

const sidebarName=document.getElementById("sidebarName")
const sidebarHeadline=document.getElementById("sidebarHeadline")

const locationEl=document.getElementById("location")
const websiteEl=document.getElementById("website")
const bioEl=document.getElementById("bio")

const experienceList=document.getElementById("experienceList")
const educationList=document.getElementById("educationList")
const skillsList=document.getElementById("skillsList")
const activityList=document.getElementById("activityList")

const editBtn=document.getElementById("editBtn")

const editModal=document.getElementById("editModal")
const expModal=document.getElementById("expModal")
const eduModal=document.getElementById("eduModal")
  const skillModal=document.getElementById("skillModal")
const expTitle = document.getElementById("expTitle")
const expCompany = document.getElementById("expCompany")
const expStart = document.getElementById("expStart")
const expEnd = document.getElementById("expEnd")

const eduSchool = document.getElementById("eduSchool")
const eduDegree = document.getElementById("eduDegree")
const eduField = document.getElementById("eduField")

const skillInput = document.getElementById("skillInput")
/* LOAD PROFILE */

async function loadProfile(){

const res=await fetch(API+"/api/users/me",{headers:{Authorization:"Bearer "+token}})

const user=await res.json()

currentUser=user

renderProfile(user)

loadActivity(user._id)

}

/* RENDER PROFILE */

function renderProfile(user){

sidebarName.innerText=user.name||""
sidebarHeadline.innerText=user.headline||""

locationEl.innerText=user.location||""
bioEl.innerText=user.bio||""

if(user.website){
websiteEl.innerText=user.website
websiteEl.href=user.website.startsWith("http")?user.website:"https://"+user.website
}

sidebarImage.src=user.profileImage || "https://cdn-icons-png.flaticon.com/512/149/149071.png"

bannerImage.src=user.bannerImage || "https://via.placeholder.com/900x200"

renderExperience(user.experience)
renderEducation(user.education)
renderSkills(user.skills)
  updateProfileStrength(user)

}
function updateProfileStrength(user){
  

let score=0

if(user.name) score+=20
if(user.headline) score+=20
if(user.bio) score+=20
if(user.experience?.length) score+=20
if(user.skills?.length) score+=20

document.getElementById("strengthBar").style.width=score+"%"

}
/* EXPERIENCE */

function renderExperience(list){

experienceList.innerHTML=""

if(!list) return

list.forEach((e,index)=>{

const div=document.createElement("div")

div.className="experience-card"

div.innerHTML=`

<h4>${e.title||""}</h4>

<p class="company">${e.company||""}</p>

<p class="date">${e.startDate||""} - ${e.endDate||"Present"}</p>

<button onclick="deleteExperience(${index})"
style="margin-top:6px;background:#e53935;">
Remove
</button>

`

experienceList.appendChild(div)

})

}

function openExperience(){expModal.style.display="flex"}

/* EDUCATION */

function renderEducation(list){

educationList.innerHTML=""

if(!list) return

list.forEach((e,index)=>{

const div=document.createElement("div")

div.innerHTML=`

<h4>${e.school||""}</h4>
<p>${e.degree||""}</p>

<button onclick="deleteEducation(${index})"
style="margin-top:6px;background:#e53935;">
Remove
</button>

`

educationList.appendChild(div)

})

}
async function saveExperience(){

const exp={
title:expTitle.value,
company:expCompany.value,
startDate:expStart.value,
endDate:expEnd.value
}

const list=currentUser.experience||[]
list.push(exp)

const res = await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({experience:list})
})

if(!res.ok){
alert("Failed to save experience")
return
}

const updatedUser = await res.json()

currentUser = updatedUser

renderExperience(updatedUser.experience)

updateProfileStrength(updatedUser)

expModal.style.display="none"

loadProfile()

}
  async function deleteExperience(index){

const list=currentUser.experience || []

list.splice(index,1)

const res = await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({experience:list})
})

if(!res.ok){
alert("Failed to remove experience")
return
}

const updatedUser = await res.json()

currentUser = updatedUser

renderExperience(updatedUser.experience)

updateProfileStrength(updatedUser)

loadProfile()

}
function openEducation(){eduModal.style.display="flex"}

/* SKILLS */

function renderSkills(list){

skillsList.innerHTML=""

if(!list) return

list.forEach((s,index)=>{

const span=document.createElement("span")

span.className="skill-tag"

span.innerHTML = `
${s}
<span onclick="deleteSkill(${index})"
style="margin-left:8px;color:red;cursor:pointer;">✕</span>
`

skillsList.appendChild(span)

})

}
async function saveEducation(){

const edu={
school:eduSchool.value,
degree:eduDegree.value,
field:eduField.value
}

const list=currentUser.education||[]
list.push(edu)

const res = await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({education:list})
})

if(!res.ok){
alert("Failed to save education")
return
}

const updatedUser = await res.json()

currentUser = updatedUser

renderEducation(updatedUser.education)

updateProfileStrength(updatedUser)

eduModal.style.display="none"

loadProfile()

}
  async function deleteEducation(index){

const list=currentUser.education || []

list.splice(index,1)

const res = await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({education:list})
})

if(!res.ok){
alert("Failed to remove education")
return
}

const updatedUser = await res.json()

currentUser = updatedUser

renderEducation(updatedUser.education)

updateProfileStrength(updatedUser)

loadProfile()

}

/* ACTIVITY */

async function loadActivity(id){

try{

const res = await fetch(API+"/api/posts/user/"+id,{
headers:{
Authorization:"Bearer "+token
}
})

if(!res.ok){

console.error("Failed to load posts")
activityList.innerHTML="<p>No activity yet</p>"
return

}

const posts = await res.json()

if(!Array.isArray(posts)){

console.error("Posts response is not array:", posts)
activityList.innerHTML="<p>No activity yet</p>"
return

}

activityList.innerHTML=""

posts.forEach(p=>{

const div=document.createElement("div")

div.className="activity-card"

div.innerHTML=`
<p>${p.content || ""}</p>
<div style="font-size:13px;color:#666;margin-top:6px;">
👍 ${p.likes?.length || 0}   💬 ${p.comments?.length || 0}
</div>
`

activityList.appendChild(div)

})

}catch(err){

console.error("Activity load error:",err)

activityList.innerHTML="<p>Unable to load activity</p>"

}

}

/* EDIT PROFILE */

editBtn.onclick=()=>{

editModal.style.display="flex"

editName.value=currentUser.name||""
editHeadline.value=currentUser.headline||""
editLocation.value=currentUser.location||""
editWebsite.value=currentUser.website||""
editBio.value=currentUser.bio||""

}

/* SAVE PROFILE */

async function saveProfile(){

const body={
name:editName.value.trim(),
headline:editHeadline.value.trim(),
location:editLocation.value.trim(),
website:editWebsite.value.trim(),
bio:editBio.value.trim()
}

const res = await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify(body)
})

if(!res.ok){
alert("Failed to update profile")
return
}

const updatedUser = await res.json()

currentUser = updatedUser

renderProfile(updatedUser)

editModal.style.display="none"

loadProfile()

}
/* NAVIGATION */

function goHome(){
window.location.href="talent.html"
}

function openPublicProfile(){
window.location.href="public-profile.html?id="+currentUser._id
}
function openSkillModal(){
skillModal.style.display="flex"
}
  function closeEdit(){
editModal.style.display="none"
}

async function saveSkill(){

const skill = skillInput.value.trim()

if(!skill) return

const list = currentUser.skills || []

list.push(skill)

const res = await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({skills:list})
})

if(!res.ok){
alert("Failed to save skill")
return
}

const updatedUser = await res.json()

currentUser = updatedUser

renderSkills(updatedUser.skills)

updateProfileStrength(updatedUser)

skillModal.style.display="none"

skillInput.value=""

loadProfile()

}
  async function deleteSkill(index){

const list=currentUser.skills || []

list.splice(index,1)

const res = await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({skills:list})
})

if(!res.ok){
alert("Failed to remove skill")
return
}

const updatedUser = await res.json()

currentUser = updatedUser

renderSkills(updatedUser.skills)

updateProfileStrength(updatedUser)

loadProfile()

}
  function createPost(){

window.location.href="talent.html"

}
/* START */

loadProfile()

</script>

</body>
</html>
