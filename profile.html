<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIFT Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f2ef;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-size:22px;
font-weight:bold;
}

.layout{
display:grid;
grid-template-columns:260px 1fr 280px;
gap:30px;
max-width:1200px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.profile-card{
text-align:center;
padding:0;
overflow:hidden;
}

.sidebar-banner img{
width:100%;
height:120px;
object-fit:cover;
}

.sidebar-avatar-wrapper{
margin-top:-40px;
}

.sidebar-avatar{
width:80px;
height:80px;
border-radius:50%;
border:4px solid white;
}

.sidebar-actions{
display:flex;
flex-direction:column;
gap:10px;
padding:20px;
}

button{
padding:8px 16px;
border:none;
border-radius:20px;
background:#0a66c2;
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#004182;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input,
.modal textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

.skill-tag{
display:inline-block;
background:#eef3f8;
padding:6px 12px;
border-radius:20px;
margin:4px;
font-size:13px;
}

.activity-card{
border-bottom:1px solid #eee;
padding:12px 0;
font-size:14px;
}

.strength-bar{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin:10px 0;
}

.strength-fill{
height:100%;
background:#0a66c2;
border-radius:10px;
}

</style>
</head>

<body>

<header class="topbar">
<div class="logo">AIFT</div>

<div>
<button onclick="goHome()">Home</button>
<button onclick="openPublicProfile()">Public Profile</button>
</div>

</header>

<div class="layout">

<aside>

<div class="card profile-card">

<div class="sidebar-banner">
<img id="bannerImage">
</div>

<div class="sidebar-avatar-wrapper">
<img id="sidebarImage" class="sidebar-avatar">
</div>

<h3 id="sidebarName"></h3>
<p id="sidebarHeadline"></p>

<p id="location"></p>
<a id="website"></a>

<div class="sidebar-actions">

<button onclick="openEdit()">Edit Profile</button>
<button onclick="openPublicProfile()">View Profile</button>

</div>

</div>

</aside>

<main>

<div class="card">
<h2>About</h2>
<p id="bio"></p>
</div>

<div class="card">

<h2>Experience</h2>
<button onclick="openExperience()">+ Add</button>

<div id="experienceList"></div>

</div>

<div class="card">

<h2>Education</h2>
<button onclick="openEducation()">+ Add</button>

<div id="educationList"></div>

</div>

<div class="card">

<h2>Skills</h2>
<button onclick="openSkillModal()">+ Add</button>

<div id="skillsList"></div>

</div>

<div class="card">

<h2>Activity</h2>

<div id="activityList"></div>

</div>

</main>

<aside>

<div class="card">

<h3>Profile Strength</h3>

<div class="strength-bar">
<div id="strengthBar" class="strength-fill"></div>
</div>

</div>

</aside>

</div>

<!-- EDIT PROFILE -->

<div id="editModal" class="modal">
<div class="modal-content">

<h2>Edit Profile</h2>

<input id="editName" placeholder="Name">
<input id="editHeadline" placeholder="Headline">
<input id="editLocation" placeholder="Location">
<input id="editWebsite" placeholder="Website">

<textarea id="editBio"></textarea>

<button onclick="saveProfile()">Save</button>

</div>
</div>

<!-- EXPERIENCE -->

<div id="expModal" class="modal">
<div class="modal-content">

<h2>Add Experience</h2>

<input id="expTitle" placeholder="Title">
<input id="expCompany" placeholder="Company">
<input id="expStart" placeholder="Start Date">
<input id="expEnd" placeholder="End Date">

<button onclick="saveExperience()">Save</button>

</div>
</div>

<!-- EDUCATION -->

<div id="eduModal" class="modal">
<div class="modal-content">

<h2>Add Education</h2>

<input id="eduSchool" placeholder="School">
<input id="eduDegree" placeholder="Degree">
<input id="eduField" placeholder="Field">

<button onclick="saveEducation()">Save</button>

</div>
</div>

<!-- SKILL -->

<div id="skillModal" class="modal">
<div class="modal-content">

<h2>Add Skill</h2>

<input id="skillInput" placeholder="Skill">

<button onclick="saveSkill()">Save</button>

</div>
</div>

<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")

let currentUser=null

async function loadProfile(){

const res=await fetch(API+"/api/users/me",{headers:{Authorization:"Bearer "+token}})
const user=await res.json()

currentUser=user

document.getElementById("sidebarName").innerText=user.name||""
document.getElementById("sidebarHeadline").innerText=user.headline||""
document.getElementById("bio").innerText=user.bio||""

renderExperience(user.experience)
renderEducation(user.education)
renderSkills(user.skills)

updateStrength()

loadActivity()

}

function renderExperience(list){

const box=document.getElementById("experienceList")
box.innerHTML=""

if(!list) return

list.forEach((e,i)=>{

box.innerHTML+=`
<div>

<b>${e.title}</b>
<p>${e.company}</p>

<button onclick="deleteExperience(${i})">Delete</button>

</div>
`

})

}

async function saveExperience(){

const exp={
title:expTitle.value,
company:expCompany.value,
startDate:expStart.value,
endDate:expEnd.value
}

const list=currentUser.experience||[]
list.push(exp)

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({experience:list})
})

closeModal("expModal")
loadProfile()

}

async function deleteExperience(i){

const list=currentUser.experience
list.splice(i,1)

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({experience:list})
})

loadProfile()

}

function renderEducation(list){

const box=document.getElementById("educationList")
box.innerHTML=""

if(!list) return

list.forEach((e,i)=>{

box.innerHTML+=`
<div>

<b>${e.school}</b>
<p>${e.degree}</p>

<button onclick="deleteEducation(${i})">Delete</button>

</div>
`

})

}

async function saveEducation(){

const edu={
school:eduSchool.value,
degree:eduDegree.value,
field:eduField.value
}

const list=currentUser.education||[]
list.push(edu)

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({education:list})
})

closeModal("eduModal")
loadProfile()

}

async function deleteEducation(i){

const list=currentUser.education
list.splice(i,1)

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({education:list})
})

loadProfile()

}

function renderSkills(list){

const box=document.getElementById("skillsList")
box.innerHTML=""

if(!list) return

list.forEach((s,i)=>{

box.innerHTML+=`
<span class="skill-tag">

${s}
<span onclick="deleteSkill(${i})" style="cursor:pointer;color:red;">x</span>

</span>
`

})

}

async function saveSkill(){

const skill=skillInput.value

const list=currentUser.skills||[]
list.push(skill)

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({skills:list})
})

closeModal("skillModal")
loadProfile()

}

async function deleteSkill(i){

const list=currentUser.skills
list.splice(i,1)

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({skills:list})
})

loadProfile()

}

function updateStrength(){

let score=0

if(currentUser.name)score+=20
if(currentUser.headline)score+=20
if(currentUser.bio)score+=20
if(currentUser.skills?.length)score+=20
if(currentUser.experience?.length)score+=20

document.getElementById("strengthBar").style.width=score+"%"

}

async function loadActivity(){

const res=await fetch(API+"/api/posts/user/"+currentUser._id,{
headers:{Authorization:"Bearer "+token}
})

const posts=await res.json()

const box=document.getElementById("activityList")
box.innerHTML=""

posts.forEach(p=>{

box.innerHTML+=`
<div class="activity-card">

${p.content}

<div>
👍 ${p.likes?.length||0}
💬 ${p.comments?.length||0}
</div>

</div>
`

})

}

function openEdit(){editModal.style.display="flex"}
function openExperience(){expModal.style.display="flex"}
function openEducation(){eduModal.style.display="flex"}
function openSkillModal(){skillModal.style.display="flex"}

function closeModal(id){
document.getElementById(id).style.display="none"
}

async function saveProfile(){

const body={
name:editName.value,
headline:editHeadline.value,
location:editLocation.value,
website:editWebsite.value,
bio:editBio.value
}

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify(body)
})

closeModal("editModal")
loadProfile()

}

function goHome(){
window.location.href="talent.html"
}

function openPublicProfile(){
window.location.href="public-profile.html?id="+currentUser._id
}

loadProfile()

</script>

</body>
</html>
