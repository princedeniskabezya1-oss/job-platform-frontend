<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIFT Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f2ef;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-size:22px;
font-weight:bold;
}

/* LAYOUT */

.layout{
display:grid;
grid-template-columns:260px 1fr 280px;
gap:30px;
max-width:1200px;
margin:auto;
padding:30px;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* LEFT SIDEBAR PROFILE */

.profile-card{
text-align:center;
padding:0;
overflow:hidden;
}

.sidebar-banner img{
width:100%;
height:120px;
object-fit:cover;
}

.sidebar-avatar-wrapper{
margin-top:-40px;
}

.sidebar-avatar{
width:80px;
height:80px;
border-radius:50%;
border:4px solid white;
}

.sidebar-actions{
display:flex;
flex-direction:column;
gap:10px;
padding:20px;
}

.upload-btn input{
display:none;
}

.upload-btn{
background:#0a66c2;
color:white;
padding:6px 10px;
border-radius:20px;
font-size:12px;
cursor:pointer;
}

.upload-btn:hover{
background:#004182;
}

/* BUTTONS */

button{
padding:8px 16px;
border:none;
border-radius:20px;
background:#0a66c2;
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#004182;
}

/* RIGHT SIDEBAR */

.strength-bar{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin:10px 0;
}

.strength-fill{
height:100%;
background:#0a66c2;
border-radius:10px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input,
.modal textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

</style>

</head>

<body>

<header class="topbar">

<div class="logo">AIFT</div>

<div>
<button onclick="goHome()">Home</button>
<button onclick="openPublicProfile()">Public Profile</button>
</div>

</header>

<div class="layout">

<!-- LEFT SIDEBAR -->

<aside>

<div class="card profile-card">

<div class="sidebar-banner">
<img id="bannerImage">
</div>

<div class="sidebar-avatar-wrapper">
<img id="sidebarImage" class="sidebar-avatar">
</div>

<h3 id="sidebarName"></h3>
<p id="sidebarHeadline"></p>

<p id="location"></p>
<a id="website"></a>

<div class="sidebar-actions">

<label class="upload-btn">
Change Photo
<input type="file" id="profileUpload">
</label>

<label class="upload-btn">
Change Banner
<input type="file" id="bannerUpload">
</label>

<button id="editBtn">Edit Profile</button>

<button onclick="openPublicProfile()">View Profile</button>

</div>

</div>

</aside>

<!-- CENTER CONTENT -->

<main>

<div class="card">
<h2>About</h2>
<p id="bio"></p>
</div>

<div class="card">
<h2>Experience</h2>
<div id="experienceList"></div>
<button onclick="openExperience()">Add Experience</button>
</div>

<div class="card">
<h2>Education</h2>
<div id="educationList"></div>
<button onclick="openEducation()">Add Education</button>
</div>

<div class="card">
<h2>Skills</h2>
<div id="skillsList"></div>
</div>

<div class="card">
<h2>Activity</h2>
<div id="activityList"></div>
</div>

</main>

<!-- RIGHT SIDEBAR -->

<aside>

<div class="card">

<h3>Profile Strength</h3>

<div class="strength-bar">
<div class="strength-fill" style="width:60%"></div>
</div>

<p>Complete your profile to increase visibility.</p>

<hr>

<h3>Quick Actions</h3>

<button onclick="openExperience()">Add Experience</button>
<button onclick="openEducation()">Add Education</button>

</div>

</aside>

</div>

<!-- EDIT MODAL -->

<div id="editModal" class="modal">

<div class="modal-content">

<h2>Edit Profile</h2>

<input id="editName" placeholder="Name">
<input id="editHeadline" placeholder="Headline">
<input id="editLocation" placeholder="Location">
<input id="editWebsite" placeholder="Website">

<textarea id="editBio"></textarea>

<button onclick="saveProfile()">Save</button>
<button onclick="closeEdit()">Cancel</button>

</div>

</div>

<!-- EXPERIENCE MODAL -->

<div id="expModal" class="modal">

<div class="modal-content">

<h2>Add Experience</h2>

<input id="expTitle" placeholder="Title">
<input id="expCompany" placeholder="Company">
<input id="expStart" placeholder="Start Date">
<input id="expEnd" placeholder="End Date">

<button onclick="saveExperience()">Save</button>

</div>

</div>

<!-- EDUCATION MODAL -->

<div id="eduModal" class="modal">

<div class="modal-content">

<h2>Add Education</h2>

<input id="eduSchool" placeholder="School">
<input id="eduDegree" placeholder="Degree">
<input id="eduField" placeholder="Field">

<button onclick="saveEducation()">Save</button>

</div>

</div>

<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")

let currentUser=null

const sidebarImage=document.getElementById("sidebarImage")
const bannerImage=document.getElementById("bannerImage")

const sidebarName=document.getElementById("sidebarName")
const sidebarHeadline=document.getElementById("sidebarHeadline")

const locationEl=document.getElementById("location")
const websiteEl=document.getElementById("website")
const bioEl=document.getElementById("bio")

const experienceList=document.getElementById("experienceList")
const educationList=document.getElementById("educationList")
const skillsList=document.getElementById("skillsList")
const activityList=document.getElementById("activityList")

const editBtn=document.getElementById("editBtn")

const editModal=document.getElementById("editModal")
const expModal=document.getElementById("expModal")
const eduModal=document.getElementById("eduModal")

/* LOAD PROFILE */

async function loadProfile(){

const res=await fetch(API+"/api/users/me",{headers:{Authorization:"Bearer "+token}})

const user=await res.json()

currentUser=user

renderProfile(user)

loadActivity(user._id)

}

/* RENDER PROFILE */

function renderProfile(user){

sidebarName.innerText=user.name||""
sidebarHeadline.innerText=user.headline||""

locationEl.innerText=user.location||""
bioEl.innerText=user.bio||""

if(user.website){
websiteEl.innerText=user.website
websiteEl.href=user.website.startsWith("http")?user.website:"https://"+user.website
}

sidebarImage.src=user.profileImage || "https://cdn-icons-png.flaticon.com/512/149/149071.png"

bannerImage.src=user.bannerImage || "https://via.placeholder.com/900x200"

renderExperience(user.experience)
renderEducation(user.education)
renderSkills(user.skills)

}

/* EXPERIENCE */

function renderExperience(list){

experienceList.innerHTML=""

if(!list) return

list.forEach(e=>{

const div=document.createElement("div")

div.innerHTML=`<h4>${e.title||""}</h4><p>${e.company||""}</p>`

experienceList.appendChild(div)

})

}

function openExperience(){expModal.style.display="flex"}

/* EDUCATION */

function renderEducation(list){

educationList.innerHTML=""

if(!list) return

list.forEach(e=>{

const div=document.createElement("div")

div.innerHTML=`<h4>${e.school||""}</h4><p>${e.degree||""}</p>`

educationList.appendChild(div)

})

}

function openEducation(){eduModal.style.display="flex"}

/* SKILLS */

function renderSkills(list){

skillsList.innerHTML=""

if(!list) return

list.forEach(s=>{

const span=document.createElement("span")

span.innerText=s

skillsList.appendChild(span)

})

}

/* ACTIVITY */

async function loadActivity(id){

const res=await fetch(API+"/api/posts/user/"+id)

const posts=await res.json()

activityList.innerHTML=""

posts.forEach(p=>{

const div=document.createElement("div")

div.innerHTML=`<p>${p.content}</p>`

activityList.appendChild(div)

})

}

/* EDIT PROFILE */

editBtn.onclick=()=>{
editModal.style.display="flex"
}

/* SAVE PROFILE */

async function saveProfile(){

const body={
name:editName.value,
headline:editHeadline.value,
location:editLocation.value,
website:editWebsite.value,
bio:editBio.value
}

await fetch(API+"/api/users/profile",{
method:"PATCH",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify(body)
})

editModal.style.display="none"

loadProfile()

}

/* NAVIGATION */

function goHome(){
window.location.href="talent.html"
}

function openPublicProfile(){
window.location.href="public-profile.html?id="+currentUser._id
}

/* START */

loadProfile()

</script>

</body>
</html>
