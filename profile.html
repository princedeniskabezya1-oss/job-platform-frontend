<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIFT Profile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f2ef;
}
  
/* top bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 40px;
background:white;
border-bottom:1px solid #ddd;
}

.logo{
font-size:22px;
font-weight:bold;
}

/* layout */

.layout{
display:grid;
grid-template-columns:250px 1fr 300px;
gap:20px;
max-width:1300px;
margin:auto;
padding:20px;
}

/* cards */

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

/* sidebar */

.sidebar-avatar{
width:80px;
height:80px;
border-radius:50%;
}

/* banner */

.profile-banner img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

/* header */

.profile-header{
display:flex;
gap:20px;
background:white;
padding:20px;
margin-top:-60px;
border-radius:8px;
}

.profile-picture{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
}

/* skills */

.skill{
background:#e6f0ff;
padding:6px 12px;
border-radius:20px;
margin:4px;
display:inline-block;
}

/* modal */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input,
.modal textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:8px 14px;
cursor:pointer;
}

</style>

</head>

<body>

<header class="topbar">

<div class="logo">AIFT</div>

<div>
<a href="feed.html">Home</a>
<a href="profile.html">Profile</a>
</div>

</header>

<div class="layout">

<!-- LEFT SIDEBAR -->

<aside>

<div class="card">

<img id="sidebarImage" class="sidebar-avatar">

<h3 id="sidebarName"></h3>

<p id="sidebarHeadline"></p>

</div>

</aside>

<!-- CENTER -->

<main>

<div class="profile-banner">

<img id="bannerImage">

<input type="file" id="bannerUpload">

</div>

<div class="profile-header">

<img id="profileImage" class="profile-picture">

<input type="file" id="profileUpload">

<div>

<h1 id="name"></h1>

<p id="headline"></p>

<p id="location"></p>

<a id="website"></a>

<br><br>

<button id="editBtn">Edit Profile</button>

</div>

</div>

<!-- ABOUT -->

<div class="card">

<h2>About</h2>

<p id="bio"></p>

</div>

<!-- EXPERIENCE -->

<div class="card">

<h2>Experience</h2>

<div id="experienceList"></div>

<button onclick="openExperience()">Add Experience</button>

</div>

<!-- EDUCATION -->

<div class="card">

<h2>Education</h2>

<div id="educationList"></div>

<button onclick="openEducation()">Add Education</button>

</div>

<!-- SKILLS -->

<div class="card">

<h2>Skills</h2>

<div id="skillsList"></div>

</div>

<!-- ACTIVITY -->

<div class="card">

<h2>Activity</h2>

<div id="activityList"></div>

</div>

</main>

<!-- RIGHT SIDEBAR -->

<aside>

<div class="card">

<h3>Profile Tips</h3>

<ul>

<li>Add experience</li>
<li>Add education</li>
<li>Add skills</li>

</ul>

</div>

</aside>

</div>

<!-- EDIT MODAL -->

<div id="editModal" class="modal">

<div class="modal-content">

<h2>Edit Profile</h2>

<input id="editName" placeholder="Name">

<input id="editHeadline" placeholder="Headline">

<input id="editLocation" placeholder="Location">

<input id="editWebsite" placeholder="Website">

<textarea id="editBio"></textarea>

<button onclick="saveProfile()">Save</button>

<button onclick="closeEdit()">Cancel</button>

</div>

</div>

<!-- EXPERIENCE MODAL -->

<div id="expModal" class="modal">

<div class="modal-content">

<h2>Add Experience</h2>

<input id="expTitle" placeholder="Title">

<input id="expCompany" placeholder="Company">

<input id="expStart" placeholder="Start Date">

<input id="expEnd" placeholder="End Date">

<button onclick="saveExperience()">Save</button>

</div>

</div>

<!-- EDUCATION MODAL -->

<div id="eduModal" class="modal">

<div class="modal-content">

<h2>Add Education</h2>

<input id="eduSchool" placeholder="School">

<input id="eduDegree" placeholder="Degree">

<input id="eduField" placeholder="Field">

<button onclick="saveEducation()">Save</button>

</div>

</div>

<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")

let currentUser=null

/* LOAD PROFILE */

async function loadProfile(){

const res=await fetch(API+"/api/users/me",{

headers:{
Authorization:"Bearer "+token
}

})

const user=await res.json()

currentUser=user

renderProfile(user)

loadActivity(user._id)

}

/* RENDER PROFILE */

function renderProfile(user){

name.innerText=user.name||""

headline.innerText=user.headline||""

location.innerText=user.location||""

bio.innerText=user.bio||""

website.innerText=user.website||""
website.href=user.website||"#"

profileImage.src=user.profileImage||""
bannerImage.src=user.bannerImage||""

sidebarImage.src=user.profileImage||""

sidebarName.innerText=user.name

sidebarHeadline.innerText=user.headline||""

renderExperience(user.experience)

renderEducation(user.education)

renderSkills(user.skills)

}

/* EXPERIENCE */

function renderExperience(list){

experienceList.innerHTML=""

if(!list) return

list.forEach(e=>{

const div=document.createElement("div")

div.innerHTML=`

<h4>${e.title||""}</h4>
<p>${e.company||""}</p>
<p>${e.startDate||""} - ${e.endDate||"Present"}</p>

`

experienceList.appendChild(div)

})

}

function openExperience(){

expModal.style.display="flex"

}

async function saveExperience(){

const exp={

title:expTitle.value,
company:expCompany.value,
startDate:expStart.value,
endDate:expEnd.value

}

const list=currentUser.experience||[]

list.push(exp)

await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({experience:list})

})

expModal.style.display="none"

loadProfile()

}

/* EDUCATION */

function renderEducation(list){

educationList.innerHTML=""

if(!list) return

list.forEach(e=>{

const div=document.createElement("div")

div.innerHTML=`

<h4>${e.school||""}</h4>
<p>${e.degree||""}</p>
<p>${e.field||""}</p>

`

educationList.appendChild(div)

})

}

function openEducation(){

eduModal.style.display="flex"

}

async function saveEducation(){

const edu={

school:eduSchool.value,
degree:eduDegree.value,
field:eduField.value

}

const list=currentUser.education||[]

list.push(edu)

await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({education:list})

})

eduModal.style.display="none"

loadProfile()

}

/* SKILLS */

function renderSkills(list){

skillsList.innerHTML=""

if(!list) return

list.forEach(s=>{

const span=document.createElement("span")

span.className="skill"

span.innerText=s

skillsList.appendChild(span)

})

}

/* ACTIVITY */

async function loadActivity(id){

const res=await fetch(API+"/api/posts/user/"+id)

const posts=await res.json()

activityList.innerHTML=""

posts.forEach(p=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<p>${p.content}</p>
<p>👍 ${p.likes.length} 💬 ${p.comments.length}</p>

`

activityList.appendChild(div)

})

}

/* EDIT PROFILE */

editBtn.onclick=()=>{

editModal.style.display="flex"

editName.value=currentUser.name||""
editHeadline.value=currentUser.headline||""
editLocation.value=currentUser.location||""
editWebsite.value=currentUser.website||""
editBio.value=currentUser.bio||""

}

function closeEdit(){

editModal.style.display="none"

}

async function saveProfile(){

const body={

name:editName.value,
headline:editHeadline.value,
location:editLocation.value,
website:editWebsite.value,
bio:editBio.value

}

await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify(body)

})

editModal.style.display="none"

loadProfile()

}

/* IMAGE UPLOAD */

profileUpload.onchange=async(e)=>{

const file=e.target.files[0]

const form=new FormData()

form.append("profileImage",file)

await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{
Authorization:"Bearer "+token
},

body:form

})

loadProfile()

}

/* BANNER UPLOAD */

bannerUpload.onchange=async(e)=>{

const file=e.target.files[0]

const form=new FormData()

form.append("bannerImage",file)

await fetch(API+"/api/users/profile",{

method:"PATCH",

headers:{
Authorization:"Bearer "+token
},

body:form

})

loadProfile()

}

/* START */

loadProfile()

</script>

</body>
</html>
