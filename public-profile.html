<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AIFT Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#fafafa;
color:#111;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid #ddd;
z-index:1000;
}

.logo{
font-weight:700;
font-size:20px;
color:#0a66c2;
}

/* PROFILE HEADER */

.profile-header{
max-width:1000px;
margin:100px auto 40px;
display:flex;
gap:50px;
align-items:center;
}

.avatar{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #eee;
}

.profile-info h2{
font-size:26px;
font-weight:600;
}

.profile-info p{
margin-top:5px;
color:#666;
}

.profile-stats{
display:flex;
gap:20px;
margin-top:10px;
}

.profile-stats span{
font-weight:600;
}

.profile-actions{
margin-top:15px;
display:flex;
gap:10px;
}

.btn{
padding:8px 18px;
border-radius:20px;
border:none;
cursor:pointer;
font-weight:600;
}

.follow{
background:#0a66c2;
color:white;
}

.message{
background:white;
border:1px solid #ccc;
}

/* GRID */

.posts-grid{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
}

.post{
position:relative;
padding-top:100%;
cursor:pointer;
overflow:hidden;
}

.post img,
.post video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
color:white;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
font-weight:600;
transition:.3s;
}

.post:hover .overlay{
opacity:1;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal-content{
max-width:800px;
width:90%;
}

.modal img,
.modal video{
width:100%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:20px;
color:white;
font-size:22px;
cursor:pointer;
}

.section{
max-width:1000px;
margin:30px auto;
}

.skill{
display:inline-block;
background:#eee;
padding:6px 12px;
border-radius:20px;
margin:4px;
font-size:13px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">AIFT</div>
</div>

<!-- PROFILE HEADER -->

<div class="profile-header">

<img id="avatar" class="avatar">

<div class="profile-info">

<h2 id="name"></h2>
<p id="headline"></p>

<div class="profile-stats">
<div><span id="followers">0</span> followers</div>
<div><span id="following">0</span> following</div>
</div>

<div class="profile-actions">
<button id="followBtn" class="btn follow" onclick="toggleFollow()">Follow</button>
<button class="btn message" onclick="messageUser()">Message</button>
</div>

</div>

</div>

<!-- EXPERIENCE -->

<div class="section">
<h3>Experience</h3>
<div id="experience"></div>
</div>

<!-- EDUCATION -->

<div class="section">
<h3>Education</h3>
<div id="education"></div>
</div>

<!-- SKILLS -->

<div class="section">
<h3>Skills</h3>
<div id="skills"></div>
</div>

<!-- POSTS -->

<div id="postsGrid" class="posts-grid"></div>

<!-- POST MODAL -->

<div id="modal" class="modal">
<div class="close" onclick="closeModal()">✕</div>
<div class="modal-content" id="modalBody"></div>
</div>

<script>

const API="https://backend-1-9b6f.onrender.com"
const token=localStorage.getItem("token")

const params=new URLSearchParams(window.location.search)
const userId=params.get("id")

let profileUser=null
let loggedUser=null

/* LOAD PROFILE */

async function loadProfile(){

const res=await fetch(API+"/api/users/"+userId+"/public")

profileUser=await res.json()

document.getElementById("avatar").src=
profileUser.profileImage||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

document.getElementById("name").innerText=profileUser.name

document.getElementById("headline").innerText=
profileUser.headline||""

document.getElementById("followers").innerText=
profileUser.followers?.length||0

document.getElementById("following").innerText=
profileUser.following?.length||0

/* EXPERIENCE */

const exp=document.getElementById("experience")
exp.innerHTML=""

(profileUser.experience||[]).forEach(e=>{

exp.innerHTML+=`
<div style="margin-bottom:6px;">
<b>${e.title}</b> - ${e.company}
</div>
`

})

/* EDUCATION */

const edu=document.getElementById("education")
edu.innerHTML=""

(profileUser.education||[]).forEach(e=>{

edu.innerHTML+=`
<div style="margin-bottom:6px;">
<b>${e.school}</b> • ${e.degree}
</div>
`

})

/* SKILLS */

const skills=document.getElementById("skills")
skills.innerHTML=""

(profileUser.skills||[]).forEach(s=>{

skills.innerHTML+=`
<span class="skill">${s}</span>
`

})

/* OWNER CHECK */

if(token){

const meRes=await fetch(API+"/api/users/me",{
headers:{Authorization:"Bearer "+token}
})

loggedUser=await meRes.json()

if(loggedUser._id===userId){

document.getElementById("followBtn").style.display="none"

}

}

}

/* POSTS */

async function loadPosts(){

const res=await fetch(API+"/api/posts/user/"+userId,{
headers: token ? {Authorization:"Bearer "+token}:{}
})

const posts=await res.json()

const grid=document.getElementById("postsGrid")
grid.innerHTML=""

posts.forEach(post=>{

const div=document.createElement("div")
div.className="post"

const media=post.mediaUrl||post.image

if(media){

div.innerHTML=`
<img src="${media}">
<div class="overlay">
❤ ${post.likes?.length||0}
</div>
`

}else{

div.innerHTML=`
<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
${post.content||""}
</div>
`

}

div.onclick=()=>openModal(post)

div.ondblclick=()=>likePost(post._id)

grid.appendChild(div)

})

}

/* LIKE */

async function likePost(postId){

await fetch(API+"/api/posts/"+postId+"/like",{
method:"PATCH",
headers:{Authorization:"Bearer "+token}
})

loadPosts()

}

/* MODAL */

function openModal(post){

let content=""

if(post.mediaUrl||post.image){

content=`<img src="${post.mediaUrl||post.image}">`

}else{

content=`<div style="padding:40px;color:white;font-size:20px;">${post.content}</div>`

}

document.getElementById("modalBody").innerHTML=content
document.getElementById("modal").style.display="flex"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

/* FOLLOW */

function toggleFollow(){

fetch(API+"/api/users/"+userId+"/follow",{
method:"PATCH",
headers:{Authorization:"Bearer "+token}
})
.then(()=>location.reload())

}

/* MESSAGE */

function messageUser(){

window.location.href="employer.html#message="+userId

}

/* START */

loadProfile()
loadPosts()

</script>

</body>
</html>
