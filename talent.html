<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Dashboard | AIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0a66c2;
  --bg:#f3f2ef;
  --card:#ffffff;
  --text:#1c1c1c;
  --muted:#6f6f6f;
  --border:#e0e0e0;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);}

/* HEADER */
.header{
  background:white;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
  font-weight:800;
  font-size:22px;
}

.logo span{color:var(--primary);}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:260px 1fr 300px;
  gap:20px;
  max-width:1300px;
  margin:40px auto;
}

/* CARD */

  .card{
  background:white;
  border-radius:12px;
  border:1px solid #e6e6e6;
  margin-bottom:16px;
  overflow:hidden;
}

.post-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:15px;
}

.post-author{
  display:flex;
  gap:10px;
  cursor:pointer;
}

.post-author img{
  width:48px;
  height:48px;
  border-radius:50%;
  object-fit:cover;
}

.post-meta{
  font-size:12px;
  color:#6f6f6f;
}

.post-content{
  padding:0 15px 15px 15px;
  font-size:15px;
  line-height:1.6;
  white-space:pre-wrap;
}

.post-media img,
.post-media video{
  width:100%;
  max-height:500px;
  object-fit:cover;
}

.post-stats{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  font-size:13px;
  color:#6f6f6f;
  border-top:1px solid #eee;
}

.post-actions{
  display:flex;
  justify-content:space-around;
  border-top:1px solid #eee;
}

.post-actions div{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
}

.post-actions div:hover{
  background:#f3f2ef;
}

.liked{
  color:#0a66c2;
  font-weight:700;
}

.profile-banner{
  width:100%;
  height:120px;
  border-radius:10px;
  object-fit:cover;
}

.profile-image{
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid white;
  margin-top:-45px;
  object-fit:cover;
}

.stat{
  margin-bottom:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo"><span>AI</span>FT Talent</div>

  <div style="display:flex;gap:25px;align-items:center;">

    <div style="cursor:pointer;" onclick="openNetwork()">
  👥 <span style="font-size:12px;">Network</span>
</div>

    <div style="cursor:pointer;position:relative;" onclick="window.location.href='messages.html'">
      💬 <span style="font-size:12px;">Messages</span>
      <span id="messageCount" style="position:absolute;top:-5px;right:-10px;background:red;color:white;font-size:10px;padding:2px 6px;border-radius:50%;display:none;">0</span>
    </div>

    <div style="cursor:pointer;position:relative;" onclick="window.location.href='notifications.html'">
      🔔 <span style="font-size:12px;">Notifications</span>
      <span id="notificationCount" style="position:absolute;top:-5px;right:-10px;background:red;color:white;font-size:10px;padding:2px 6px;border-radius:50%;display:none;">0</span>
    </div>

    <div onclick="window.location.href='profile.html'" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <img id="topProfileImg" style="width:32px;height:32px;border-radius:50%;">
      <span id="topProfileName" style="font-size:14px;"></span>
    </div>

  </div>
</div>


<div class="container">

<!-- LEFT COLUMN -->
<div>

  <div class="card" id="profileCard"></div>

<div class="card">
  <h3>Career Tools</h3>

  <div style="padding:10px 0;border-bottom:1px solid #eee;cursor:pointer;"
       onclick="showFeed()">
    📰 Feed
  </div>

  <div style="padding:10px 0;border-bottom:1px solid #eee;cursor:pointer;"
       onclick="showJobs()">
    💼 Jobs
  </div>

  <div style="padding:10px 0;border-bottom:1px solid #eee;cursor:pointer;"
       onclick="loadMyApplications()">
    📩 My Applications
  </div>

  <div style="padding:10px 0;border-bottom:1px solid #eee;cursor:pointer;"
       onclick="showSavedJobs()">
    ⭐ Saved Jobs
  </div>

  <div style="padding:10px 0;cursor:pointer;"
       onclick="window.location.href='profile.html'">
    ✏ Edit Profile
  </div>
</div>
  </div>

<!-- CENTER COLUMN -->
<div>

  <!-- FEED PANEL (DEFAULT) -->
  <div id="feedPanel">

    <!-- Create Post -->
<!-- Create Post Trigger -->
<div class="card" onclick="openPostModal()" style="cursor:pointer;">
  <div style="color:#6f6f6f;">Start a post...</div>
</div>

    <!-- Posts Container -->
    <div id="posts"></div>

  </div>

  <!-- JOBS PANEL -->
  <div id="jobsPanel" style="display:none;">
    <div id="jobList"></div>
  </div>

  <!-- SAVED JOBS PANEL -->
  <div id="savedPanel" style="display:none;">
    <div id="savedJobList"></div>
  </div>

  <!-- TOOL PANEL (Network / Applications / Dynamic tools) -->
  <div id="toolPanel" style="display:none;"></div>

</div>

<!-- RIGHT COLUMN -->
<div>

  <div class="card">
    <h3>Career Dashboard</h3>
    <div class="stat">Applications Sent: <b id="appCount">0</b></div>
    <div class="stat">Saved Jobs: <b id="savedCount">0</b></div>
    <div class="stat">Pro Status: <b id="proStatus">Free</b></div>
    <div class="stat">CV Uploaded: <b id="cvStatus">No</b></div>
  </div>

</div>

</div>

<script>
const API="https://backend-1-9b6f.onrender.com";
const token=localStorage.getItem("token");
if(!token) window.location.href="login.html";
  let currentPage = 1;
let loading = false;
let noMorePosts = false;

/* LOAD PROFILE */
async function loadProfile(){
  const res=await fetch(API+"/api/users/me",{headers:{Authorization:"Bearer "+token}});
  const user=await res.json();
  localStorage.setItem("userId", user._id);

  document.getElementById("profileCard").innerHTML=`
    <img class="profile-banner" src="${user.bannerImage || 'https://via.placeholder.com/600x120'}">
    <img class="profile-image" src="${user.profileImage || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
    <h3>${user.name}</h3>
    <div style="color:#6f6f6f;font-size:14px;">${user.headline || ''}</div>
  `;

  document.getElementById("topProfileImg").src =
    user.profileImage || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
  document.getElementById("topProfileName").innerText = user.name;

  document.getElementById("proStatus").innerText = user.isPro ? "Pro" : "Free";
  document.getElementById("cvStatus").innerText = user.cvUrl ? "Yes" : "No";
}

/* LOAD POSTS */

window.addEventListener("scroll", () => {

  if(loading || noMorePosts) return;

  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){

    loading = true;
    currentPage++;

    loadPosts(currentPage).then(() => {
      loading = false;
    });
  }
});

async function createPost(){

  const content = document.getElementById("postContent").value.trim();
  const fileInput = document.getElementById("mediaInput");
  const file = fileInput.files[0];

  if(!content && !file){
    alert("Please add text or media.");
    return;
  }

  const formData = new FormData();
  formData.append("content", content);

  if(file){
    formData.append("media", file);
  }

  const res = await fetch(API+"/api/posts",{
    method:"POST",
    headers:{
      Authorization:"Bearer "+token
    },
    body:formData
  });

  if(!res.ok){
    alert("Post failed");
    return;
  }

  const newPost = await res.json();

  document.getElementById("postContent").value="";
  fileInput.value="";
  document.getElementById("filePreviewContainer").innerHTML="";

  closePostModal();
  prependPost(newPost);
}
  function openPostModal(){
  document.getElementById("postModal").style.display = "flex";
}

function closePostModal(){
  document.getElementById("postModal").style.display = "none";
}

document.addEventListener("change", function(e){

  if(e.target.id === "mediaInput"){

    const file = e.target.files[0];
    const previewContainer = document.getElementById("filePreviewContainer");

    previewContainer.innerHTML = "";

    if(!file) return;

    if(file.type.startsWith("image")){
      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      img.style.width = "100%";
      img.style.borderRadius = "10px";
      previewContainer.appendChild(img);

    } else if(file.type.startsWith("video")){
      const video = document.createElement("video");
      video.src = URL.createObjectURL(file);
      video.controls = true;
      video.style.width = "100%";
      video.style.borderRadius = "10px";
      previewContainer.appendChild(video);
    }

  }

});

/* APPLICATION COUNT */
async function loadMyApplications(){
  const res=await fetch(API+"/api/applications",{headers:{Authorization:"Bearer "+token}});
  const apps=res.ok?await res.json():[];
  document.getElementById("appCount").innerText = apps.length;
}
  /* LOAD JOBS */
async function loadJobs(){

  const res = await fetch(API+"/api/jobs/recommended",{
    headers:{ Authorization:"Bearer "+token }
  });

  const jobs = res.ok ? await res.json() : [];
  const container = document.getElementById("jobList");
  container.innerHTML = "";

  if(jobs.length === 0){
    container.innerHTML = `
      <div class="card">
        <div style="color:#6f6f6f;">No jobs available.</div>
      </div>
    `;
    return;
  }

  jobs.forEach(job=>{
    container.innerHTML += `
      <div class="card">

        <h3>${job.title}</h3>
        <div style="color:#6f6f6f;">
          ${job.company} • ${job.location}
        </div>

        <div style="margin:10px 0;">
          ${job.description.substring(0,120)}...
        </div>

        <div style="display:flex;gap:10px;">
          <button onclick="saveJob('${job._id}')"
            style="background:#f0f2f5;color:black;border:none;padding:6px 15px;border-radius:20px;">
            ⭐ Save
          </button>

          <button onclick="quickApply('${job._id}')"
            style="background:#0a66c2;color:white;border:none;padding:6px 15px;border-radius:20px;">
            🚀 Apply
          </button>
        </div>

      </div>
    `;
  });
}
  async function saveJob(id){

  const res = await fetch(API+"/api/jobs/"+id+"/save",{
    method:"PATCH",
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  if(data.saved){
    alert("Job saved successfully ⭐");
  } else {
    alert("Job removed from saved list");
  }

  loadSavedJobsCount();
}
  async function loadSavedJobsCount(){

  const res = await fetch(API+"/api/users/me",{
    headers:{ Authorization:"Bearer "+token }
  });

  const user = await res.json();

  document.getElementById("savedCount").innerText =
    user.savedJobs ? user.savedJobs.length : 0;
}
  async function quickApply(id){

  const res = await fetch(API+"/api/jobs/"+id+"/quick-apply",{
    method:"POST",
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  if(res.ok){
    alert("Application sent 🚀");
    loadMyApplications();
  } else {
    alert(data.message);
  }
}
  async function loadSavedJobs(){

  const res = await fetch(API+"/api/users/me",{
    headers:{ Authorization:"Bearer "+token }
  });

  const user = await res.json();
  const container = document.getElementById("savedJobList");
  container.innerHTML = "";

  if(!user.savedJobs || user.savedJobs.length === 0){
    container.innerHTML = `
      <div class="card">
        <div style="color:#6f6f6f;">No saved jobs yet.</div>
      </div>
    `;
    return;
  }

  const jobsRes = await fetch(API+"/api/jobs",{
    headers:{ Authorization:"Bearer "+token }
  });

  const allJobs = jobsRes.ok ? await jobsRes.json() : [];

  const saved = allJobs.filter(job =>
    user.savedJobs.includes(job._id)
  );

  saved.forEach(job=>{
    container.innerHTML += `
      <div class="card">
        <h3>${job.title}</h3>
        <div style="color:#6f6f6f;">
          ${job.company} • ${job.location}
        </div>

        <button onclick="saveJob('${job._id}')"
          style="margin-top:10px;background:#e53935;color:white;border:none;padding:6px 15px;border-radius:20px;">
          Remove
        </button>
      </div>
    `;
  });
}
/* =========================================
   PANEL SWITCHING (FIXED)
========================================= */

function showFeed(){
  document.getElementById("feedPanel").style.display = "block";
  document.getElementById("jobsPanel").style.display = "none";
  document.getElementById("savedPanel").style.display = "none";
  document.getElementById("toolPanel").style.display = "none";
}

function showJobs(){
  document.getElementById("feedPanel").style.display = "none";
  document.getElementById("jobsPanel").style.display = "block";
  document.getElementById("savedPanel").style.display = "none";
  document.getElementById("toolPanel").style.display = "none";
  loadJobs();
}

function showSavedJobs(){
  document.getElementById("feedPanel").style.display = "none";
  document.getElementById("jobsPanel").style.display = "none";
  document.getElementById("savedPanel").style.display = "block";
  document.getElementById("toolPanel").style.display = "none";
  loadSavedJobs();
}

function backToFeed(){
  showFeed();
}
/* =========================================
   NETWORK SYSTEM (Talent)
========================================= */

async function openNetwork(){

document.getElementById("feedPanel").style.display="none";
document.getElementById("jobsPanel").style.display="none";
document.getElementById("savedPanel").style.display="none";
document.getElementById("toolPanel").style.display="block";

  document.getElementById("toolPanel").innerHTML=`
    <div class="card">

      <div style="display:flex;gap:20px;margin-bottom:20px;">
        <div class="network-tab" onclick="loadFollowers()">Followers</div>
        <div class="network-tab" onclick="loadFollowing()">Following</div>
        <div class="network-tab" onclick="loadSuggestions()">Suggestions</div>
      </div>

      <div id="networkList"></div>

      <div style="margin-top:20px;">
        <button onclick="backToFeed()">⬅ Back</button>
      </div>

    </div>
  `;

  loadSuggestions();
}

async function loadFollowers(){
  const res = await fetch(API+"/api/users/me/followers",{
    headers:{Authorization:"Bearer "+token}
  });
  const users = res.ok ? await res.json() : [];
  renderNetworkUsers(users);
}

async function loadFollowing(){
  const res = await fetch(API+"/api/users/me/following",{
    headers:{Authorization:"Bearer "+token}
  });
  const users = res.ok ? await res.json() : [];
  renderNetworkUsers(users);
}

async function loadSuggestions(){
  const res = await fetch(API+"/api/users/network",{
    headers:{Authorization:"Bearer "+token}
  });
  const users = res.ok ? await res.json() : [];
  renderNetworkUsers(users);
}

function renderNetworkUsers(users){

  const container = document.getElementById("networkList");
  container.innerHTML="";

  if(users.length===0){
    container.innerHTML="<p style='color:#6f6f6f;'>No users found</p>";
    return;
  }

  users.forEach(user=>{
    container.innerHTML+=`
      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 0;
        border-bottom:1px solid #eee;
      ">

        <div style="display:flex;gap:12px;align-items:center;">
          <img src="${user.profileImage || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
               style="width:55px;height:55px;border-radius:50%;object-fit:cover;">

          <div>
            <div style="font-weight:600;">${user.name}</div>
            <div style="font-size:13px;color:#6f6f6f;">
              ${user.headline || ""} • ${user.role}
            </div>
          </div>
        </div>

        <div style="display:flex;gap:10px;">
          <button onclick="connectUser('${user._id}')">
            Follow
          </button>
        </div>

      </div>
    `;
  });
}
async function loadPosts(page = 1){

  if(noMorePosts) return;

  const res = await fetch(API+"/api/posts?page="+page,{
    headers:{ Authorization:"Bearer "+token }
  });

  const posts = res.ok ? await res.json() : [];
  const container = document.getElementById("posts");

  if(page === 1){
    container.innerHTML = "";
    noMorePosts = false;
  }

  if(posts.length < 5){
    noMorePosts = true;
  }

  posts.forEach(post=>{

    const liked = post.likes.includes(localStorage.getItem("userId"));

    container.innerHTML += `
      <div class="card" id="post-${post._id}">

        <div class="post-header">
          <div class="post-author" onclick="visitProfile('${post.author?._id}')">
            <img src="${post.author?.profileImage || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
            <div>
              <div><b>${post.author?.name}</b></div>
              <div class="post-meta">
                ${post.author?.headline || ""} • ${formatTime(post.createdAt)}
              </div>
            </div>
          </div>
          <div style="cursor:pointer;">•••</div>
        </div>

        ${post.content ? `<div class="post-content">${post.content}</div>` : ""}

        ${post.mediaUrl ? `
          <div class="post-media">
            ${post.mediaType==="video"
              ? `<video controls src="${post.mediaUrl}"></video>`
              : `<img src="${post.mediaUrl}">`}
          </div>
        ` : ""}

        <div class="post-stats">
          <div>${post.likes.length} reactions</div>
          <div>${post.comments.length} comments</div>
        </div>

        <div class="post-actions">
          <div onclick="likePost('${post._id}', this)"
               class="${liked ? "liked" : ""}">
            👍 Like
          </div>

          <div onclick="toggleCommentBox('${post._id}')">
            💬 Comment
          </div>

          <div onclick="sharePost('${post._id}')">
            🔗 Share
          </div>
        </div>

        <div id="comments-${post._id}" style="padding:10px 15px;">
          ${post.comments.map(c=>`
            <div style="margin-bottom:6px;">
              <b>${c.user?.name}</b> ${c.text}
            </div>
          `).join("")}
        </div>

        <input id="comment-input-${post._id}"
          placeholder="Write a comment..."
          style="width:calc(100% - 30px);margin:10px 15px;padding:8px;border-radius:20px;border:1px solid #ddd;display:none;"
          onkeydown="if(event.key==='Enter'){addComment('${post._id}', this.value, this);}">

      </div>
    `;
  });
}

  function prependPost(post){

  const container = document.getElementById("posts");

  const liked = post.likes?.includes(localStorage.getItem("userId"));

  container.innerHTML = `
    <div class="card" id="post-${post._id}">
      <div class="post-header">
        <div class="post-author" onclick="visitProfile('${post.author._id}')">
          <img src="${post.author.profileImage || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
          <div>
            <div><b>${post.author.name}</b></div>
            <div class="post-meta">
              ${post.author.headline || ""} • Just now
            </div>
          </div>
        </div>
        <div style="cursor:pointer;">•••</div>
      </div>

      ${post.content ? `<div class="post-content">${post.content}</div>` : ""}

      ${post.mediaUrl ? `
        <div class="post-media">
          ${post.mediaType==="video"
            ? `<video controls src="${post.mediaUrl}"></video>`
            : `<img src="${post.mediaUrl}">`}
        </div>
      ` : ""}

      <div class="post-stats">
        <div>${post.likes?.length || 0} reactions</div>
        <div>0 comments</div>
      </div>

      <div class="post-actions">
        <div onclick="likePost('${post._id}', this)"
             class="${liked ? "liked" : ""}">
          👍 Like
        </div>
        <div onclick="toggleCommentBox('${post._id}')">
          💬 Comment
        </div>
        <div onclick="sharePost('${post._id}')">
          🔗 Share
        </div>
      </div>

      <div id="comments-${post._id}" style="padding:10px 15px;"></div>

      <input id="comment-input-${post._id}"
        placeholder="Write a comment..."
        style="width:calc(100% - 30px);margin:10px 15px;padding:8px;border-radius:20px;border:1px solid #ddd;display:none;"
        onkeydown="if(event.key==='Enter'){addComment('${post._id}', this.value, this);}">

    </div>
  ` + container.innerHTML;
}
  async function likePost(id, element){

  const res = await fetch(API+"/api/posts/"+id+"/like",{
    method:"PATCH",
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  const post = document.getElementById("post-"+id);
  const stat = post.querySelector(".post-stats div");

  stat.innerText = data.likes + " reactions";

  element.classList.toggle("liked");
}
  async function addComment(id,text,inputElement){

  if(!text.trim()) return;

  const res = await fetch(API+"/api/posts/"+id+"/comment",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({text})
  });

  const data = await res.json();

  const commentContainer = document.getElementById("comments-"+id);

  commentContainer.innerHTML += `
    <div style="margin-bottom:6px;">
      <b>${data.user.name}</b> ${data.text}
    </div>
  `;

  inputElement.value="";
}
  function sharePost(id){
  const link = window.location.origin + "/employee.html#post-"+id;
  navigator.clipboard.writeText(link);
  alert("Post link copied!");
}
async function connectUser(id){
  await fetch(API + "/api/users/" + id + "/follow", {
    method:"PATCH",
    headers:{ Authorization:"Bearer "+token }
  });
  loadSuggestions();
}
async function loadMessageCount(){
  const res = await fetch(API + "/api/messages/unread/count",{
    headers:{ Authorization:"Bearer "+token }
  });
  const data = res.ok ? await res.json() : {count:0};

  const badge = document.getElementById("messageCount");
  if(data.count > 0){
    badge.innerText = data.count;
    badge.style.display = "block";
  } else {
    badge.style.display = "none";
  }
}

async function loadNotificationCount(){
  const res = await fetch(API + "/api/notifications/unread",{
    headers:{ Authorization:"Bearer "+token }
  });
  const data = res.ok ? await res.json() : {count:0};

  const badge = document.getElementById("notificationCount");
  if(data.count > 0){
    badge.innerText = data.count;
    badge.style.display = "block";
  } else {
    badge.style.display = "none";
  }
}
  async function enforceTalentRole(){
  const res = await fetch(API+"/api/users/me",{
    headers:{ Authorization:"Bearer "+token }
  });

  const user = await res.json();

  if(user.role !== "talent"){
    window.location.href = "employer.html";
  }
}

  async function editPost(id){

  const newText = prompt("Edit your post:");
  if(!newText) return;

  await fetch(API+"/api/posts/"+id,{
    method:"PATCH",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({content:newText})
  });

  loadPosts();
}

async function deletePost(id){

  if(!confirm("Delete this post?")) return;

  await fetch(API+"/api/posts/"+id,{
    method:"DELETE",
    headers:{ Authorization:"Bearer "+token }
  });

  document.getElementById("post-"+id)?.remove();
}

function toggleCommentBox(id){
  const input = document.getElementById("comment-input-"+id);
  input.style.display = input.style.display === "none" ? "block" : "none";
}
function formatTime(dateString){

  const now = new Date();
  const postDate = new Date(dateString);
  const diff = Math.floor((now - postDate)/1000);

  if(diff < 60) return "Just now";
  if(diff < 3600) return Math.floor(diff/60)+"m ago";
  if(diff < 86400) return Math.floor(diff/3600)+"h ago";
  return Math.floor(diff/86400)+"d ago";
}

  function visitProfile(id){
  if(!id) return;
  window.location.href = "public-profile.html?id=" + id;
}
